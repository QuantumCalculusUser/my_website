<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Weather Dashboard</h1>
        <nav>
            <a href="../../main.html">Back to Portfolio</a>
        </nav>
    </header>

    <main>
        <section id="weather-search">
            <h2>Check Weather</h2>
            <input type="text" id="city-input" placeholder="Enter city name">
            <button id="search-btn">Get Weather</button>
        </section>

        <section id="current-weather">
            <h2>Current Weather</h2>
            <div id="weather-display" class="weather-card">
                <div id="weather-icon">☀️</div>
                <div id="weather-info">
                    <h3 id="city-name">City Name</h3>
                    <p id="temperature">--°C</p>
                    <p id="description">Weather description</p>
                    <div class="weather-details">
                        <span id="humidity">Humidity: --%</span>
                        <span id="wind-speed">Wind: -- km/h</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="forecast">
            <h2>5-Day Forecast</h2>
            <div id="forecast-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
