<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <script>
        (() => {
            const themeStorageKey = 'universalPreferredTheme';
            const savedTheme = localStorage.getItem(themeStorageKey) || 'default';
            const effectiveTheme = savedTheme === 'default'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : savedTheme;
            const root = document.documentElement;
            root.classList.add('theme-preload');
            root.dataset.theme = savedTheme;
            root.classList.toggle('theme-light', effectiveTheme === 'light');
            root.classList.toggle('theme-dark', effectiveTheme === 'dark');
        })();
    </script>
    <link rel="stylesheet" href="../../globals.css">
    <link rel="stylesheet" href="../../universal.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Weather Dashboard</h1>
        <nav>
            <a href="../../index.html">Back to Portfolio</a>
        </nav>
    </header>

    <main>
        <section id="weather-search">
            <h2>Check Weather</h2>
            <input type="text" id="city-input" placeholder="Enter city name">
            <button id="search-btn">Get Weather</button>
        </section>

        <section id="current-weather">
            <h2>Current Weather</h2>
            <div id="weather-display" class="weather-card">
                <div id="weather-icon">&#9728;&#65039;</div>
                <div id="weather-info">
                    <h3 id="city-name">City Name</h3>
                    <p id="temperature">--&deg;C</p>
                    <p id="description">Weather description</p>
                    <div class="weather-details">
                        <span id="humidity">Humidity: --%</span>
                        <span id="wind-speed">Wind: -- km/h</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="forecast">
            <h2>5-Day Forecast</h2>
            <div id="forecast-container"></div>
        </section>
    </main>

    <script src="index.js"></script>
    <script src="../../universal.js" defer></script>
</body>
</html>
