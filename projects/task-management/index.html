<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <script>
        (() => {
            const themeStorageKey = 'universalPreferredTheme';
            const savedTheme = localStorage.getItem(themeStorageKey) || 'default';
            const effectiveTheme = savedTheme === 'default'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : savedTheme;
            const root = document.documentElement;
            root.classList.add('theme-preload');
            root.dataset.theme = savedTheme;
            root.classList.toggle('theme-light', effectiveTheme === 'light');
            root.classList.toggle('theme-dark', effectiveTheme === 'dark');
        })();
    </script>
    <link rel="stylesheet" href="../../globals.css">
    <link rel="stylesheet" href="../../universal.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Task Management App</h1>
        <nav>
            <a href="../../index.html">Back to Portfolio</a>
        </nav>
    </header>

    <main>
        <section id="task-input">
            <h2>Add New Task</h2>
            <input type="text" id="task-text" placeholder="Enter task description">
            <select id="task-priority">
                <option value="low">Low Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <button id="add-task">Add Task</button>
        </section>

        <section id="task-list">
            <h2>Your Tasks</h2>
            <div id="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div id="tasks"></div>
        </section>
    </main>

    <script src="index.js"></script>
    <script src="../../universal.js" defer></script>
</body>
</html>
