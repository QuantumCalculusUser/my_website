<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <script>
        (() => {
            const themeStorageKey = 'universalPreferredTheme';
            const savedTheme = localStorage.getItem(themeStorageKey) || 'default';
            const effectiveTheme = savedTheme === 'default'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : savedTheme;
            const root = document.documentElement;
            root.classList.add('theme-preload');
            root.dataset.theme = savedTheme;
            root.classList.toggle('theme-light', effectiveTheme === 'light');
            root.classList.toggle('theme-dark', effectiveTheme === 'dark');
        })();
    </script>
    <link rel="stylesheet" href="../../globals.css">
    <link rel="stylesheet" href="../../universal.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My E-Commerce Store</h1>
        <nav>
            <a href="../../index.html">Back to Portfolio</a>
            <div id="cart-count">Cart: 0 items</div>
        </nav>
    </header>

    <main>
        <section id="products">
            <h2>Featured Products</h2>
            <div id="product-list"></div>
        </section>

        <section id="cart">
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <div id="cart-total">Total: $0.00</div>
        </section>
    </main>

    <script src="index.js"></script>
    <script src="../../universal.js" defer></script>
</body>
</html>
